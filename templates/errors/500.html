{% extends "base_auth.html" %}
{% block page_title %}500 — Server Error{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-page);">
  <div style="text-align:center;padding:48px 24px;max-width:400px;">
    <div style="font-size:80px;margin-bottom:16px;">⚙️</div>
    <h1 style="font-size:64px;font-weight:800;color:var(--color-danger);line-height:1;">500</h1>
    <h2 style="font-size:22px;font-weight:600;margin:12px 0 8px;">Internal Server Error</h2>
    <p style="font-size:14px;color:var(--text-muted);line-height:1.6;margin-bottom:28px;">
      Something went wrong on our end. The ICT team has been notified. Please try again shortly.
    </p>
    <a href="{% url 'portal:dashboard' %}" class="btn btn-primary">← Return to Dashboard</a>
  </div>
</div>
{% endblock %}
