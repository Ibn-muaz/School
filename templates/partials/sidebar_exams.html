{% with request.resolver_match.url_name as url_name %}
<div class="sidebar-section-label">Exams Office</div>
<a href="{% url 'portal:dashboard' %}" class="nav-item {% if url_name == 'dashboard' %}active{% endif %}">
  <span class="nav-icon"><i data-lucide="layout-dashboard" style="width:18px;height:18px;"></i></span>
  <span class="nav-label">Dashboard</span><span class="nav-tooltip">Dashboard</span>
</a>
<a href="{% url 'portal:scoresheet' %}" class="nav-item {% if url_name == 'scoresheet' %}active{% endif %}">
  <span class="nav-icon"><i data-lucide="check-square" style="width:18px;height:18px;"></i></span>
  <span class="nav-label">Result Moderation</span><span class="nav-tooltip">Result Moderation</span>
</a>
<a href="{% url 'portal:student_results' %}" class="nav-item {% if url_name == 'student_results' %}active{% endif %}">
  <span class="nav-icon"><i data-lucide="award" style="width:18px;height:18px;"></i></span>
  <span class="nav-label">Result Release</span><span class="nav-tooltip">Result Release</span>
</a>
<a href="{% url 'portal:manage_offerings' %}" class="nav-item {% if url_name == 'manage_offerings' %}active{% endif %}">
  <span class="nav-icon"><i data-lucide="book-open" style="width:18px;height:18px;"></i></span>
  <span class="nav-label">Course Offerings</span><span class="nav-tooltip">Course Offerings</span>
</a>
<a href="{% url 'portal:registration_approvals' %}" class="nav-item {% if url_name == 'registration_approvals' %}active{% endif %}">
  <span class="nav-icon"><i data-lucide="clipboard-check" style="width:18px;height:18px;"></i></span>
  <span class="nav-label">Course Reg Approvals</span><span class="nav-tooltip">Course Reg Approvals</span>
</a>
<a href="{% url 'portal:reports' %}" class="nav-item {% if url_name == 'reports' %}active{% endif %}">
  <span class="nav-icon"><i data-lucide="bar-chart-2" style="width:18px;height:18px;"></i></span>
  <span class="nav-label">Reports</span><span class="nav-tooltip">Reports</span>
</a>
<div class="sidebar-section-label" style="margin-top:12px;">Account</div>
<a href="{% url 'portal:profile' %}" class="nav-item {% if url_name == 'profile' %}active{% endif %}">
  <span class="nav-icon"><i data-lucide="user-circle" style="width:18px;height:18px;"></i></span>
  <span class="nav-label">My Profile</span><span class="nav-tooltip">My Profile</span>
</a>
<a href="{% url 'portal:logout' %}" class="nav-item" style="color:rgba(255,100,100,0.8);" onclick="return confirm('Log out?')">
  <span class="nav-icon"><i data-lucide="log-out" style="width:18px;height:18px;"></i></span>
  <span class="nav-label">Logout</span><span class="nav-tooltip">Logout</span>
</a>
{% endwith %}
