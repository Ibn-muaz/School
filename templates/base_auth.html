<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block page_title %}Sign In{% endblock %} — Sanga Portal</title>
  <meta name="description" content="Sign in to Sanga University Management Portal">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/portal.css' %}">
</head>
<body>
  {% if messages %}
    <div style="position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px;">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}" style="padding: 12px 20px; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background: white; border-left: 4px solid {% if message.tags == 'error' %}#f56565{% elif message.tags == 'success' %}#48bb78{% else %}#4299e1{% endif %}; min-width: 300px; animation: slideIn 0.3s ease;">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}
  <script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
